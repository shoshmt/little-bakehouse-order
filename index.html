<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>The Little Bakehouse | הזמנות</title>
  <style>
    :root{
      --bg:#faf6f1;
      --card:#ffffff;
      --ink:#1a1a1a;
      --muted:#6b6b6b;
      --line:#eadcc9;
      --brand:#a8743b;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Arial, sans-serif;
      color:var(--ink);
      background:var(--bg);
    }
    .wrap{
      max-width: 980px;
      width: 100%;
      margin: 0 auto;
      padding: 0 16px 40px;
    }
    header{
      text-align:center;
      padding: 26px 0 18px;
      background: #f2e3d6;
      border-bottom: 1px solid var(--line);
    }
    .logo{
      width: 110px;
      height: 110px;
      object-fit: cover;
      border-radius: 16px;
      background:#fff;
      border: 1px solid var(--line);
      display:block;
      margin: 0 auto 10px;
    }
    h1{
      margin: 6px 0 6px;
      font-size: 26px;
      line-height: 1.2;
    }
    .sub{
      margin: 0 auto;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
      padding: 0 10px 2px;
      max-width: 720px;
    }

    .section-title{
      margin: 26px 0 14px;
      font-size: 22px;
      font-weight: 800;
      text-align:right;
    }

    /* grid responsive – פותר את “חצי אתר” */
    #products{
      display:grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }
    @media (max-width: 900px){
      #products{ grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    @media (max-width: 560px){
      #products{ grid-template-columns: 1fr; }
    }

    .card{
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
      box-shadow: 0 2px 10px rgba(0,0,0,.04);
      overflow:hidden;
    }
    .prod-img{
      width: 100%;
      height: 180px;
      object-fit: cover;
      border-radius: 12px;
      border: 1px solid #f0e4d6;
      margin-bottom: 10px;
      background:#fff;
      display:block;
    }
    .name{
      font-weight: 800;
      font-size: 18px;
      margin-bottom: 6px;
    }
    .price{
      color: var(--brand);
      font-weight: 800;
      margin-bottom: 10px;
    }
    .row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-top: 8px;
    }
    input[type="number"], input[type="text"], textarea, select{
      width: 170px;
      max-width: 100%;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 12px;
      font-size: 16px;
      background:#fff;
    }
    label{ font-size: 14px; color: var(--muted); }
    .muted{ color: var(--muted); font-size: 13px; }

    .order-box{
      margin-top: 22px;
      background:#fff;
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 16px;
    }
    .order-grid{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    @media (max-width: 700px){
      .order-grid{ grid-template-columns: 1fr; }
    }
    .full{ grid-column: 1 / -1; }
    .total{
      display:flex;
      align-items:center;
      justify-content:space-between;
      font-weight: 900;
      font-size: 18px;
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid var(--line);
    }
    button{
      width: 100%;
      margin-top: 12px;
      padding: 14px 16px;
      border: 0;
      border-radius: 14px;
      background: #1f7a4a;
      color:#fff;
      font-weight: 900;
      font-size: 16px;
      cursor:pointer;
    }
    button:disabled{
      opacity:.5;
      cursor:not-allowed;
    }
    #formHint{
      margin-top: 10px;
      color: #b00020;
      font-weight: 700;
      min-height: 22px;
    }
  </style>
</head>

<body>
  <header>
    <img class="logo" src="logo-new.jpg?v=1" alt="The Little Bakehouse logo">
    <h1>בית המאפה הקטן בדולב – The Little Bakehouse</h1>
    <div class="sub">
      הזמנה יום מראש · אין איסוף ביום ראשון · איסוף מדולב<br>
      בסיום ההזמנה יפתח WhatsApp עם הודעה מוכנה לשליחה 😊
    </div>
  </header>

  <div class="wrap">
    <div class="section-title">תפריט</div>
    <div id="products"></div>

    <div class="order-box">
      <div class="section-title" style="margin:0 0 12px; text-align:right;">פרטי הזמנה</div>

      <div class="order-grid">
        <div>
          <label>שם מלא</label>
          <input id="custName" type="text" placeholder="לדוגמה: שוש חדד" />
        </div>
        <div>
          <label>טלפון</label>
          <input id="custPhone" type="text" placeholder="05X-XXXXXXX" />
        </div>
        <div class="full">
          <label>תאריך איסוף (לפחות מחר, לא ראשון)</label>
          <input id="pickupDate" type="date" />
          <div id="dateHint" class="muted"></div>
        </div>
        <div class="full">
          <label>הערות</label>
<textarea id="notes" placeholder="הערות נוספות להזמנה"></textarea>
        </div>
      </div>

      <div class="total">
        <div>סה״כ</div>
        <div id="total">₪0</div>
      </div>

      <div id="formHint"></div>
      <button id="sendBtn" disabled>שליחה ב־WhatsApp</button>
    </div>
  </div>

  <script src="app.js?v=1"></script>
</body>
</html>
