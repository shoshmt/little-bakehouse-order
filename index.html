<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>The Little Bakehouse</title>

  <style>
    body{
      margin:0;
      font-family: Georgia, serif;
      background:#f6efe6;
      color:#3e2f23;
    }

    header{
      text-align:center;
      padding:28px 16px 18px;
      background:#efe3d5;
      border-bottom:1px solid #e2d2c0;
    }

    .logo{
      width:92px;
      height:92px;
      object-fit:cover;
      border-radius:18px;
      box-shadow:0 6px 18px rgba(0,0,0,0.08);
      margin:0 auto 12px;
      display:block;
      background:#fffaf3;
    }

    h1{
      margin:0;
      font-size:26px;
      font-weight:700;
    }

    .sub{
      margin-top:8px;
      color:#7a6653;
      font-style:italic;
      font-size:14px;
    }

    main{
      max-width:1000px;
      margin:0 auto;
      padding:22px 16px 60px;
    }

    .grid{
      display:grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap:18px;
      margin-top:18px;
    }

    .card{
      background:#fffaf3;
      border:1px solid #f0e2d4;
      border-radius:18px;
      padding:16px;
      box-shadow:0 6px 16px rgba(0,0,0,0.05);
    }

    .card img{
      width:100%;
      border-radius:14px;
      margin-bottom:10px;
      display:block;
      box-shadow:0 6px 16px rgba(0,0,0,0.07);
    }

    .name{font-weight:700; margin-bottom:6px;}
    .price{color:#8c5a2b; font-weight:700; margin-bottom:10px;}

    .row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }

    input[type="number"]{
      width:90px;
      padding:10px;
      border-radius:12px;
      border:1px solid #dbc7b5;
      background:#fff;
      font-family:inherit;
      font-size:16px;
      text-align:center;
    }

    .box{
      margin-top:26px;
      background:#fffaf3;
      border:1px solid #f0e2d4;
      border-radius:18px;
      padding:18px;
      box-shadow:0 6px 16px rgba(0,0,0,0.05);
    }
