<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>The Little Bakehouse</title>

  <style>
    body{
      margin:0;
      font-family: Georgia, serif;
      background:#f6efe6;
      color:#3e2f23;
    }

 header{
  position:relative;
  text-align:center;
  padding:60px 16px 40px;
  background-image: url("header-bg.jpg");
  background-size: cover;
  background-position: center;
  border-bottom:1px solid #e2d2c0;
}

header::before{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(255,248,238,0.65);
}

header *{
  position:relative;
}


   .logo{
  width:160px;
  height:160px;
      object-fit:cover;
      border-radius:18px;
      box-shadow:0 6px 18px rgba(0,0,0,0.08);
      margin:0 auto 12px;
      display:block;
      background:#fffaf3;
    }

    h1{
      margin:0;
      font-size:26px;
      font-weight:700;
    }

   .sub{
  margin-top:10px;
  color:#6b5442;
  font-size:16px;
  font-weight:600;
}


    main{
      max-width:1000px;
      margin:0 auto;
      padding:22px 16px 60px;
    }

    .grid{
      display:grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap:18px;
      margin-top:18px;
    }

    .card{
      background:#fffaf3;
      border:1px solid #f0e2d4;
      border-radius:18px;
      padding:16px;
      box-shadow:0 6px 16px rgba(0,0,0,0.05);
    }

    .card img{
      width:100%;
      border-radius:14px;
      margin-bottom:10px;
      display:block;
      box-shadow:0 6px 16px rgba(0,0,0,0.07);
    }

    .name{font-weight:700; margin-bottom:6px;}
    .price{color:#8c5a2b; font-weight:700; margin-bottom:10px;}

    .row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }

    input[type="number"]{
      width:90px;
      padding:10px;
      border-radius:12px;
      border:1px solid #dbc7b5;
      background:#fff;
      font-family:inherit;
      font-size:16px;
      text-align:center;
    }

    .box{
      margin-top:26px;
      background:#fffaf3;
      border:1px solid #f0e2d4;
      border-radius:18px;
      padding:18px;
      box-shadow:0 6px 16px rgba(0,0,0,0.05);
    }

    .box h2{margin:0 0 10px 0; font-size:18px;}

    input[type="text"], input[type="tel"], input[type="date"], textarea{
      width:100%;
      padding:12px;
      border-radius:12px;
      border:1px solid #dbc7b5;
      font-family:inherit;
      margin-top:10px;
      font-size:16px;
      background:#fff;
      box-sizing:border-box;
    }

    textarea{min-height:90px;}

    .total{
      margin-top:14px;
      font-weight:800;
      font-size:18px;
    }

    .btn{
      margin-top:14px;
      width:100%;
      padding:14px;
      border:none;
      border-radius:14px;
      background:#7a4b2c;
      color:#fff;
      font-weight:800;
      font-size:16px;
      cursor:pointer;
    }

    .hint{
      margin-top:10px;
      color:#7a6653;
      font-size:12px;
      text-align:center;
      line-height:1.4;
    }
  </style>
</head>

<body>
  <header>
    <img class="logo" src="logo-new.jpg" alt="The Little Bakehouse logo" />
    <h1>The Little Bakehouse</h1>
<div class="sub">בית המאפה הקטן בדולב</div>
  </header>

  <main>
    <div class="grid" id="products"></div>

    <div class="box">
      <h2>פרטי הזמנה</h2>
      <input id="custName" type="text" placeholder="שם מלא" />
      <input id="custPhone" type="tel" placeholder="טלפון" />
      <input id="pickupDate" type="date" />
      <textarea id="notes" placeholder="הערות להזמנה"></textarea>

      <div class="total">סה״כ: <span id="total">₪0</span></div>

      <button class="btn" id="sendBtn" type="button">שליחת הזמנה ב-WhatsApp</button>

      <div class="hint">הזמנה יום מראש • אין איסוף ביום ראשון</div>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
