<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>The Little Bakehouse | הזמנת לחמים</title>

  <style>
    body {
      font-family: system-ui, -apple-system, Arial;
      background: #faf6f1;
      margin: 0;
    }

    header {
      padding: 24px 16px;
      background: #f1e3d6;
      border-bottom: 1px solid #e8d5c5;
      text-align: center;
    }

    .logo {
      width: 130px;
      height: 130px;
      object-fit: contain;
      display: block;
      margin: 0 auto 14px auto;
    }

    h1 {
      margin: 0;
      font-size: 22px;
    }

    .sub {
      margin-top: 8px;
      color: #4a3a2a;
      font-size: 14px;
      line-height: 1.5;
    }

    main {
      padding: 16px;
      max-width: 900px;
      margin: 0 auto;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
      gap: 12px;
    }

    .card {
      background: #fff;
      border: 1px solid #eadccc;
      border-radius: 14px;
      padding: 12px;
    }

    .name {
      font-weight: 700;
    }

    .price {
      color: #6b4b2a;
      font-weight: 700;
      margin-top: 6px;
    }

    .row {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-top: 10px;
    }

    input[type="number"] {
      width: 96px;
      padding: 10px;
      border: 1px solid #e5d7c7;
      border-radius: 10px;
    }

    .section {
      margin-top: 18px;
    }

    .box {
      background: #fff;
      border: 1px solid #eadccc;
      border-radius: 14px;
      padding: 14px;
    }

    label {
      font-size: 14px;
    }

    input, textarea {
      font-size: 16px;
    }

    input[type="text"],
    input[type="tel"],
    input[type="date"],
    textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid #e5d7c7;
      border-radius: 10px;
    }

    textarea {
      min-height: 90px;
    }

    .total {
      font-size: 18px;
      font-weight: 800;
    }

    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: #6b4b2a;
      color: #fff;
      font-weight: 800;
      font-size: 16px;
      cursor: pointer;
    }

    .btn:disabled {
      opacity: .5;
      cursor: not-allowed;
    }

    .footer {
      margin-top: 10px;
      font-size: 12px;
      color: #6d5a46;
      line-height: 1.4;
    }

    .hint {
      margin-top: 10px;
      font-size: 12px;
      color: #8a2d2d;
      font-weight: 600;
    }
  </style>
</head>

<body>

  <header>
    <!-- לוגו חדש -->
<img class="logo" src="logo-new.jpg?v=999" alt="The Little Bakehouse logo" />

    <h1>The Little Bakehouse – בית המאפה הקטן בדולב</h1>

    <div class="sub">
      הזמנה יום מראש • אין איסוף ביום ראשון • איסוף מדולב<br>
      בסיום ההזמנה ייפתח WhatsApp עם הודעה מוכנה לשליחה 🙂
    </div>
  </header>

  <main>

    <div class="section">
      <h2 style="margin:0 0 10px 0;">תפריט</h2>
      <div id="products" class="grid"></div>
    </div>

    <div class="section">
      <div class="box">
        <h2 style="margin:0 0 10px 0;">פרטי הזמנה</h2>

        <label>שם מלא</label>
        <input id="custName" type="text" placeholder="לדוגמה: שוש חדד" />

        <div style="height:10px"></div>

        <label>טלפון</label>
        <input id="custPhone" type="tel" placeholder="05X-XXXXXXX" />

        <div style="height:10px"></div>

        <label>תאריך איסוף (לפחות מחר, לא ראשון)</label>
        <input id="pickupDate" type="date" />
        <div class="footer" id="dateHint"></div>

        <div style="height:10px"></div>

        <label>הערות</label>
        <textarea id="notes" placeholder="למשל: לפרוס? טעם למחמצת המתוקה? וכו׳"></textarea>

        <div style="height:12px"></div>

        <div class="total">סה״כ: <span id="total">₪0</span></div>

        <div style="height:12px"></div>

        <button id="sendBtn" class="btn" disabled>
          שלחי הזמנה ב־WhatsApp
        </button>

        <div id="formHint" class="hint"></div>

        <div class="footer">
          התשלום וסגירת האיסוף יתואמו בוואטסאפ לאחר שליחת ההזמנה.
        </div>
      </div>
    </div>

  </main>

  <!-- חשוב: אם שינית app.js לאחרונה תעלי את המספר -->
  <script src="app.js?v=7"></script>

</body>
</html>
