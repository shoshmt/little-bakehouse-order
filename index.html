<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>בית המאפה הקטן בדולב</title>

  <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;800&display=swap" rel="stylesheet">

  <style>
    body{
      margin:0;
      font-family:'Assistant', sans-serif;
      background:url("./site-bg.jpg") center top repeat;
      color:#3e2f23;
    }

    header{
      position:relative;
      overflow:hidden;
      text-align:center;
      padding:90px 16px 55px;
      background:url("./header-bg.jpg") center/cover no-repeat;
      border-bottom:1px solid #e2d2c0;
    }

    .main-title{
      margin:0 0 20px 0;
      font-size:56px;
      font-weight:800;
      color:#6a3d1f;
      letter-spacing:1px;
      line-height:1.1;
    }

    .logo{
      width:230px;
      height:230px;
      object-fit:cover;
      border-radius:28px;
      box-shadow:0 10px 28px rgba(0,0,0,0.15);
      margin:0 auto 18px;
      display:block;
      background:#fffaf3;
    }

    .sub-title{
      margin-top:6px;
      font-size:20px;
      font-weight:600;
      color:#4e2f1e;
    }

    main{
      max-width:1100px;
      margin:0 auto;
      padding:30px 16px 70px;
    }

    .section-title{
      margin:22px 0 10px;
      font-size:20px;
      font-weight:800;
      color:#3e2f23;
    }

    .grid{
      display:grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap:20px;
      margin-top:10px;
    }

    .card{
      background:#fffaf3;
      border:1px solid #f0e2d4;
      border-radius:22px;
      padding:18px;
      box-shadow:0 8px 20px rgba(0,0,0,0.06);
    }

    .card img{
      width:100%;
      border-radius:16px;
      margin-bottom:12px;
      display:block;
      box-shadow:0 6px 16px rgba(0,0,0,0.08);
      /* להקטין רק את כרטיסי המאפינס + מיקס לחמניות */
.compact-card img{
  height: 200px;      /* אפשר 180-220 לפי הטעם */
  object-fit: cover;
}

    }

    .name{
      font-weight:700;
      margin-bottom:6px;
      font-size:17px;
    }

    .price{
      color:#8c5a2b;
      font-weight:800;
      margin-bottom:12px;
    }

    .row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }

    input[type="number"]{
      width:110px;
      padding:10px;
      border-radius:12px;
      border:1px solid #dbc7b5;
      background:#fff;
      font-family:inherit;
      font-size:16px;
      text-align:center;
    }

    select{
      width:100%;
      padding:12px;
      border-radius:12px;
      border:1px solid #dbc7b5;
      background:#fff;
      font-family:inherit;
      font-size:16px;
      box-sizing:border-box;
    }

    .box{
      margin-top:35px;
      background:#fffaf3;
      border:1px solid #f0e2d4;
      border-radius:22px;
      padding:22px;
      box-shadow:0 8px 22px rgba(0,0,0,0.06);
    }

    .box h2{
      margin:0 0 14px 0;
      font-size:20px;
      font-weight:800;
    }

    input[type="text"],
    input[type="tel"],
    input[type="date"],
    textarea{
      width:100%;
      padding:14px;
      border-radius:14px;
      border:1px solid #dbc7b5;
      font-family:inherit;
      margin-top:12px;
      font-size:16px;
      background:#fff;
      box-sizing:border-box;
    }

    textarea{ min-height:100px; }

    .field-label{
      display:block;
      margin-top:14px;
      font-weight:800;
      color:#4e2f1e;
    }

    .pickup-note{
      margin-top:10px;
      background:#fff6ea;
      border:1px dashed #d8c0aa;
      border-radius:14px;
      padding:12px 14px;
      color:#5a3a26;
      line-height:1.6;
      font-size:14px;
    }

    .rule-msg{
      margin-top:10px;
      background:#fff0e6;
      border:1px solid #e3b39a;
      border-radius:14px;
      padding:12px 14px;
      color:#6b2d1a;
      line-height:1.6;
      font-size:14px;
      display:none;
    }

    .total{
      margin-top:18px;
      font-weight:900;
      font-size:20px;
    }

    .btn{
      margin-top:18px;
      width:100%;
      padding:16px;
      border:none;
      border-radius:16px;
      background:#7a4b2c;
      color:#fff;
      font-weight:900;
      font-size:17px;
      cursor:pointer;
      transition:0.2s;
    }

    .btn:hover{ background:#5f3821; }
    .btn:disabled{ opacity:0.6; cursor:not-allowed; }

    .hint{
      margin-top:12px;
      color:#7a6653;
      font-size:14px;
      text-align:center;
      line-height:1.5;
    }
  </style>
</head>

<body>
  <header>
    <h1 class="main-title">בית המאפה הקטן בדולב</h1>
    <img class="logo" src="logo-new.jpg" alt="logo" />
    <div class="sub-title">מאפיית בוטיק למאפי מחמצת</div>
  </header>

  <main>
    <div class="section-title">לחמי מחמצת</div>
    <div class="grid" id="breads"></div>

    <div class="section-title">מיקס לחמניות מחמצת</div>
    <div class="grid" id="rolls"></div>

    <div class="section-title">מאפינס</div>
    <div class="grid" id="muffins"></div>

    <div class="box">
      <h2>פרטי הזמנה</h2>

      <input id="custName" type="text" placeholder="שם מלא" />
      <input id="custPhone" type="tel" placeholder="טלפון" />
      <input id="pickupDate" type="date" />

      <label class="field-label" for="pickupPoint">נקודת איסוף</label>
      <select id="pickupPoint">
        <option value="דולב">דולב</option>
        <option value="בית שמש – בית משפחת מוריס">בית שמש – בית משפחת מוריס</option>
        <option value="גבעות עדן – בית משפחת מוריס (יונתן ואליטל)">גבעות עדן – בית משפחת מוריס (יונתן ואליטל)</option>
      </select>

      <div class="pickup-note" id="pickupNote"></div>
      <div class="rule-msg" id="pickupRuleMsg" aria-live="polite"></div>

      <textarea id="notes" placeholder="הערות להזמנה"></textarea>

      <div class="total">סה״כ: <span id="total">₪0</span></div>

      <button class="btn" id="sendBtn" type="button">שליחת הזמנה ב-WhatsApp</button>

      <div class="hint">הזמנה יום מראש • בדולב אין איסוף לחמים ביום ראשון (מאפינס כן)</div>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
