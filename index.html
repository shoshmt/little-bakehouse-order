<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>בית המאפה הקטן בדולב</title>

  <!-- Assistant Font -->
  <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body{
      margin:0;
      font-family:'Assistant', sans-serif;
      background:#f6efe6;
      color:#3e2f23;
    }

    header{
      position:relative;
      text-align:center;
      padding:90px 16px 55px;
      background: url("./header-bg.jpg") center/cover no-repeat;
      border-bottom:1px solid #e2d2c0;
    }

    header *{
      position:relative;
    }

    .main-title{
      margin:0 0 20px 0;
      font-family:'Assistant', sans-serif;
      font-size:56px;
      font-weight:400; /* Light */
      line-height:1.1;
      color:#6a3d1f;
      letter-spacing:2px;
    }

    .logo{
      width:220px;
      height:220px;
      object-fit:cover;
      border-radius:28px;
      box-shadow:0 10px 28px rgba(0,0,0,0.15);
      margin:0 auto 18px;
      display:block;
      background:#fffaf3;
    }

    .sub-title{
      margin-top:6px;
      font-size:16px;
      font-weight:400;
      letter-spacing:2px;
      color:#6b5442;
    }

    main{
      max-width:1000px;
      margin:0 auto;
      padding:30px 16px 70px;
    }

    .grid{
      display:grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap:20px;
      margin-top:20px;
    }

    .card{
      background:#fffaf3;
      border:1px solid #f0e2d4;
      border-radius:20px;
      padding:18px;
      box-shadow:0 8px 20px rgba(0,0,0,0.06);
    }

    .card img{
      width:100%;
      border-radius:16px;
      margin-bottom:12px;
      display:block;
      box-shadow:0 6px 16px rgba(0,0,0,0.08);
    }

    .name{
      font-weight:600;
      margin-bottom:6px;
      font-size:18px;
    }

    .price{
      color:#8c5a2b;
      font-weight:600;
      margin-bottom:12px;
    }

    .row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }

    input[type="number"]{
      width:100px;
      padding:10px;
      border-radius:12px;
      border:1px solid #dbc7b5;
      background:#fff;
      font-family:'Assistant', sans-serif;
      font-size:16px;
      text-align:center;
    }

    .box{
      margin-top:35px;
      background:#fffaf3;
      border:1px solid #f0e2d4;
      border-radius:22px;
      padding:22px;
      box-shadow:0 8px 22px rgba(0,0,0,0.06);
    }

    .box h2{
      margin:0 0 14px 0;
      font-size:22px;
      font-weight:600;
    }

    input[type="text"],
    input[type="tel"],
    input[type="date"],
    textarea{
      width:100%;
      padding:14px;
      border-radius:14px;
      border:1px solid #dbc7b5;
      font-family:'Assistant', sans-serif;
      margin-top:12px;
      font-size:16px;
      background:#fff;
      box-sizing:border-box;
    }

    textarea{
      min-height:100px;
    }

    .total{
      margin-top:18px;
      font-weight:600;
      font-size:20px;
    }

    .btn{
      margin-top:18px;
      width:100%;
      padding:16px;
      border:none;
      border-radius:16px;
      background:#7a4b2c;
      color:#fff;
      font-family:'Assistant', sans-serif;
      font-weight:600;
      font-size:17px;
      cursor:pointer;
      transition:0.2s;
    }

    .btn:hover{
      background:#5f3821;
    }

    .hint{
      margin-top:12px;
      color:#7a6653;
      font-size:13px;
      text-align:center;
      line-height:1.5;
      font-weight:400;
    }
  </style>
</head>

<body>

  <header>
    <h1 class="main-title">בית המאפה הקטן בדולב</h1>
    <img class="logo" src="logo-new.jpg" alt="The Little Bakehouse logo" />
    <div class="sub-title">The Little Bakehouse</div>
  </header>

  <main>
    <div class="grid" id="products"></div>

    <div class="box">
      <h2>פרטי הזמנה</h2>

      <input id="custName" type="text" placeholder="שם מלא" />
      <input id="custPhone" type="tel" placeholder="טלפון" />
      <input id="pickupDate" type="date" />
      <textarea id="notes" placeholder="הערות להזמנה"></textarea>

      <div class="total">סה״כ: <span id="total">₪0</span></div>

      <button class="btn" id="sendBtn" type="button">שליחת הזמנה ב-WhatsApp</button>

      <div class="hint">הזמנה יום מראש • אין איסוף ביום ראשון</div>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
