<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>בית המאפה הקטן בדולב</title>

<link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Assistant', sans-serif;
  background:url("./site-bg.jpg") center top repeat;
  color:#3e2f23;
}

header{
  text-align:center;
  padding:90px 16px 60px;
  background:url("./header-bg.jpg") center/cover no-repeat;
  border-bottom:1px solid #e2d2c0;
}

.main-title{
  margin:0 0 20px 0;
  font-size:54px;
  font-weight:500;
  color:#6a3e1f;
}

.logo{
  width:230px;
  height:230px;
  object-fit:cover;
  border-radius:28px;
  box-shadow:0 10px 28px rgba(0,0,0,0.15);
  margin:0 auto 18px;
  display:block;
  background:#fffaf3;
}

.sub-title{
  font-size:30px;
  font-weight:400;
  color:#5b3a24;
  margin-top:8px;
}

main{
  max-width:1000px;
  margin:0 auto;
  padding:30px 16px 70px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:22px;
}

.card{
  background:#fffaf3;
  border-radius:22px;
  padding:18px;
  box-shadow:0 8px 20px rgba(0,0,0,0.06);
}

.card img{
  width:100%;
  border-radius:16px;
  margin-bottom:12px;
}

.name{
  font-weight:700;
  margin-bottom:6px;
}

.price{
  color:#8c5a2b;
  font-weight:700;
  margin-bottom:12px;
}

.row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
}

input[type="number"], select{
  width:100%;
  padding:10px;
  border-radius:12px;
  border:1px solid #dbc7b5;
  font-family:inherit;
  text-align:center;
}

.box{
  margin-top:40px;
  background:#fffaf3;
  border-radius:24px;
  padding:24px;
  box-shadow:0 8px 22px rgba(0,0,0,0.06);
}

input, textarea{
  width:100%;
  padding:14px;
  border-radius:14px;
  border:1px solid #dbc7b5;
  margin-top:12px;
  font-family:inherit;
  font-size:16px;
  box-sizing:border-box;
}

textarea{min-height:90px;}

.total{
  margin-top:18px;
  font-weight:800;
  font-size:20px;
}

.btn{
  margin-top:18px;
  width:100%;
  padding:16px;
  border:none;
  border-radius:16px;
  background:#7a4b2c;
  color:white;
  font-weight:800;
  font-size:17px;
  cursor:pointer;
}

.btn:hover{background:#5f3821;}

.warning{
  color:#b60000;
  font-weight:600;
  margin-top:10px;
  display:none;
}
</style>
</head>

<body>

<header>
  <h1 class="main-title">בית המאפה הקטן בדולב</h1>
  <img class="logo" src="logo-new.jpg" />
  <div class="sub-title">מאפיית בוטיק למאפי מחמצת</div>
</header>

<main>

<div class="grid" id="products"></div>

<div class="box">
<h2>פרטי הזמנה</h2>

<input id="custName" placeholder="שם מלא">
<input id="custPhone" placeholder="טלפון">
<input id="pickupDate" type="date">

<select id="pickupLocation">
  <option value="">בחרי נקודת איסוף</option>
  <option value="דולב">דולב – להזמין לילה לפני | אין איסוף לחמים ביום ראשון</option>
  <option value="בית שמש">בית שמש – משפחת מוריס (בתיאום שבועי)</option>
  <option value="גבעות עדן">גבעות עדן – משפחת מוריס (בתיאום שבועי)</option>
</select>

<textarea id="notes" placeholder="הערות להזמנה"></textarea>

<div class="total">סה״כ: ₪<span id="total">0</span></div>

<div id="warning" class="warning">
לא ניתן להזמין לחמים לאיסוף ביום ראשון בדולב.
</div>

<button class="btn" id="sendBtn">שליחת הזמנה ב-WhatsApp</button>
</div>

</main>

<script src="app.js"></script>
</body>
</html>
