<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>בית המאפה הקטן בדולב</title>

  <!-- Google Font: Assistant -->
  <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;800&display=swap" rel="stylesheet">

  <style>
    body{
      margin:0;
      font-family:'Assistant', sans-serif;
      background:url("./site-bg.jpg") repeat;
      color:#3e2f23;
    }

    /* ================= HEADER ================= */
    header{
      text-align:center;
      padding:100px 20px 60px;
      background:url("./header-bg.jpg") center/cover no-repeat;
      border-bottom:1px solid #e2d2c0;
    }

    .main-title{
      margin:0 0 25px 0;
      font-size:56px;
      font-weight:800;
      color:#6a3d1f;
      letter-spacing:1.5px;
      line-height:1.1;
    }

    .logo{
      width:240px;
      height:240px;
      object-fit:cover;
      border-radius:30px;
      box-shadow:0 12px 30px rgba(0,0,0,0.18);
      margin:0 auto 20px;
      display:block;
      background:#fffaf3;
    }

    .sub-title{
      font-size:22px;
      font-weight:300; /* Assistant Light */
      color:#6b4a34;
      margin-top:10px;
    }

    /* Wheat divider (illustrated) */
    .wheat-divider{
      margin-top:20px;
      display:flex;
      justify-content:center;
    }

    .wheat-divider svg{
      width:180px;
      height:auto;
      opacity:0.85;
    }

    /* ================= CONTENT ================= */
    main{
      max-width:1000px;
      margin:0 auto;
      padding:40px 16px 80px;
    }

    .grid{
      display:grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap:20px;
      margin-top:20px;
    }

    .card{
      background:#fffaf3;
      border:1px solid #f0e2d4;
      border-radius:20px;
      padding:18px;
      box-shadow:0 8px 20px rgba(0,0,0,0.06);
    }

    .card img{
      width:100%;
      border-radius:16px;
      margin-bottom:12px;
      display:block;
      box-shadow:0 6px 16px rgba(0,0,0,0.08);
    }

    .name{
      font-weight:600;
      margin-bottom:6px;
      font-size:18px;
    }

    .price{
      color:#8c5a2b;
      font-weight:700;
      margin-bottom:12px;
    }

    .row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }

    input[type="number"]{
      width:100px;
      padding:10px;
      border-radius:12px;
      border:1px solid #dbc7b5;
      background:#fff;
      font-family:inherit;
      font-size:16px;
      text-align:center;
    }

    /* ================= ORDER BOX ================= */
    .box{
      margin-top:40px;
      background:#fffaf3;
      border:1px solid #f0e2d4;
      border-radius:22px;
      padding:22px;
      box-shadow:0 8px 22px rgba(0,0,0,0.06);
    }

    .box h2{
      margin:0 0 14px 0;
      font-size:22px;
      font-weight:600;
    }

    input[type="text"],
    input[type="tel"],
    input[type="date"],
    textarea{
      width:100%;
      padding:14px;
      border-radius:14px;
      border:1px solid #dbc7b5;
      font-family:inherit;
      margin-top:12px;
      font-size:16px;
      background:#fff;
      box-sizing:border-box;
    }

    textarea{
      min-height:100px;
    }

    .total{
      margin-top:18px;
      font-weight:800;
      font-size:20px;
    }

    .btn{
      margin-top:18px;
      width:100%;
      padding:16px;
      border:none;
      border-radius:16px;
      background:#7a4b2c;
      color:#fff;
      font-weight:800;
      font-size:17px;
      cursor:pointer;
      transition:0.2s;
    }

    .btn:hover{
      background:#5f3821;
    }

    .hint{
      margin-top:12px;
      color:#7a6653;
      font-size:14px;
      text-align:center;
      line-height:1.5;
    }
  </style>
</head>

<body>

  <header>
    <h1 class="main-title">בית המאפה הקטן בדולב</h1>
    <img class="logo" src="logo-new.jpg" alt="logo" />
    <div class="sub-title">מאפיית בוטיק למאפי מחמצת</div>

    <div class="wheat-divider">
      <svg viewBox="0 0 300 40" xmlns="http://www.w3.org/2000/svg">
        <g stroke="#b68b5e" stroke-width="1.5" fill="none" stroke-linecap="round">
          <line x1="20" y1="20" x2="120" y2="20"/>
          <line x1="180" y1="20" x2="280" y2="20"/>

          <!-- Wheat left -->
          <path d="M130 20 Q135 10 140 20"/>
          <path d="M135 18 Q140 8 145 18"/>
          <path d="M140 16 Q145 6 150 16"/>

          <!-- Wheat right -->
          <path d="M170 20 Q165 10 160 20"/>
          <path d="M165 18 Q160 8 155 18"/>
          <path d="M160 16 Q155 6 150 16"/>
        </g>
      </svg>
    </div>
  </header>

  <main>
    <div class="grid" id="products"></div>

    <div class="box">
      <h2>פרטי הזמנה</h2>

      <input id="custName" type="text" placeholder="שם מלא" />
      <input id="custPhone" type="tel" placeholder="טלפון" />
      <input id="pickupDate" type="date" />
      <textarea id="notes" placeholder="הערות להזמנה"></textarea>

      <div class="total">סה״כ: <span id="total">₪0</span></div>

      <button class="btn" id="sendBtn" type="button">שליחת הזמנה ב-WhatsApp</button>

      <div class="hint">הזמנה יום מראש • אין איסוף ביום ראשון</div>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
