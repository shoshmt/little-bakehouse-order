<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>בית המאפה הקטן בדולב</title>

<link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Assistant',sans-serif;
  background:url("./site-bg.jpg") center top repeat;
  color:#3e2f23;
}

/* ===== HEADER ===== */
header{
  text-align:center;
  padding:90px 16px 55px;
  background:url("./header-bg.jpg") center/cover no-repeat;
  border-bottom:1px solid #e2d2c0;
}

.main-title{
  font-size:56px;
  font-weight:800;
  margin:0 0 18px;
  color:#6a3d1f;
}

.logo{
  width:230px;
  height:230px;
  object-fit:cover;
  border-radius:28px;
  box-shadow:0 10px 28px rgba(0,0,0,0.15);
  margin:0 auto 16px;
  display:block;
}

.sub-title{
  font-size:22px;
  font-weight:600;
  color:#4e2f1e;
}

/* ===== LAYOUT ===== */
main{
  max-width:1100px;
  margin:0 auto;
  padding:30px 16px 70px;
}

.section-title{
  font-size:22px;
  font-weight:800;
  margin:30px 0 10px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:20px;
}

/* ===== CARDS ===== */
.card{
  background:#fffaf3;
  border:1px solid #f0e2d4;
  border-radius:22px;
  padding:18px;
  box-shadow:0 8px 20px rgba(0,0,0,0.06);
}

.card img{
  width:100%;
  border-radius:16px;
  margin-bottom:12px;
  display:block;
}

/* קומפקטי רק למאפינס ולמיקס */
.compact-card img{
  height:190px !important;
  object-fit:cover !important;
}

.name{
  font-weight:700;
  margin-bottom:6px;
}

.price{
  font-weight:800;
  color:#8c5a2b;
  margin-bottom:12px;
}

.row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
}

input[type="number"], select{
  width:100%;
  padding:10px;
  border-radius:12px;
  border:1px solid #dbc7b5;
  font-family:inherit;
}

.box{
  margin-top:40px;
  background:#fffaf3;
  border-radius:22px;
  padding:22px;
  box-shadow:0 8px 22px rgba(0,0,0,0.06);
}

textarea{
  width:100%;
  min-height:90px;
  margin-top:12px;
  padding:12px;
  border-radius:12px;
  border:1px solid #dbc7b5;
}

.total{
  margin-top:18px;
  font-weight:800;
  font-size:20px;
}

.btn{
  margin-top:18px;
  width:100%;
  padding:14px;
  border:none;
  border-radius:14px;
  background:#7a4b2c;
  color:#fff;
  font-weight:800;
  cursor:pointer;
}

.rule-msg{
  margin-top:12px;
  padding:12px;
  background:#fff0e6;
  border-radius:14px;
  color:#6b2d1a;
  display:none;
}
</style>
</head>

<body>

<header>
  <h1 class="main-title">בית המאפה הקטן בדולב</h1>
  <img class="logo" src="logo-new.jpg">
  <div class="sub-title">מאפיית בוטיק למאפי מחמצת</div>
</header>

<main>

<div class="section-title">לחמי מחמצת</div>
<div class="grid" id="breads"></div>

<div class="section-title">מיקס לחמניות מחמצת</div>
<div class="grid" id="rolls"></div>

<div class="section-title">מאפינס</div>
<div class="grid" id="muffins"></div>

<div class="box">
  <h2>פרטי הזמנה</h2>
  <input id="custName" type="text" placeholder="שם מלא">
  <input id="custPhone" type="tel" placeholder="טלפון">
  <input id="pickupDate" type="date">

  <select id="pickupPoint">
    <option value="דולב">דולב</option>
    <option value="בית שמש">בית שמש – בית משפחת מוריס</option>
    <option value="גבעות עדן">גבעות עדן – בית משפחת מוריס</option>
  </select>

  <div class="rule-msg" id="ruleMsg"></div>

  <textarea id="notes" placeholder="הערות להזמנה"></textarea>

  <div class="total">סה״כ: <span id="total">₪0</span></div>
  <button class="btn" id="sendBtn">שליחת הזמנה ב-WhatsApp</button>
</div>

</main>

<script src="app.js?v=10"></script>
</body>
</html>
