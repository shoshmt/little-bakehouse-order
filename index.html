<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>בית המאפה הקטן בדולב</title>

  <style>
    body{
      margin:0;
      font-family: "Assistant", sans-serif;
      background:url("./site-bg.jpg") center/cover fixed;
      color:#3e2f23;
    }

    header{
      text-align:center;
      padding:90px 16px 55px;
      background:url("./header-bg.jpg") center/cover no-repeat;
      border-bottom:1px solid #e2d2c0;
    }

    .main-title{
      margin:0 0 20px 0;
      font-size:52px;
      font-weight:800;
      color:#4a2a18;
    }

    .logo{
      width:240px;
      height:240px;
      object-fit:cover;
      border-radius:28px;
      box-shadow:0 12px 28px rgba(0,0,0,0.2);
      margin:0 auto 18px;
      display:block;
      background:#fffaf3;
    }

    .sub-title{
      font-size:22px;
      font-weight:400;
      color:#4e2f1e;
      margin-top:10px;
    }

    main{
      max-width:1100px;
      margin:0 auto;
      padding:40px 16px 70px;
    }

    .grid{
      display:grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap:24px;
    }

    .card{
      background:#fffaf3;
      border-radius:20px;
      padding:18px;
      box-shadow:0 8px 22px rgba(0,0,0,0.08);
    }

    .card img{
      width:100%;
      border-radius:16px;
      margin-bottom:12px;
      display:block;
    }

    .name{
      font-weight:700;
      margin-bottom:6px;
      font-size:17px;
    }

    .price{
      color:#8c5a2b;
      font-weight:700;
      margin-bottom:12px;
    }

    input[type="number"], select{
      width:100%;
      padding:10px;
      border-radius:12px;
      border:1px solid #dbc7b5;
      font-size:16px;
      text-align:center;
      margin-top:8px;
      box-sizing:border-box;
      background:#fff;
    }

    .box{
      margin-top:60px;
      background:#fffaf3;
      border-radius:22px;
      padding:24px;
      box-shadow:0 8px 22px rgba(0,0,0,0.08);
    }

    input, textarea{
      width:100%;
      padding:14px;
      border-radius:14px;
      border:1px solid #dbc7b5;
      margin-top:12px;
      font-size:16px;
      box-sizing:border-box;
      background:#fff;
    }

    textarea{ min-height:100px; }

    .total{
      margin-top:18px;
      font-weight:900;
      font-size:20px;
    }

    .btn{
      margin-top:18px;
      width:100%;
      padding:16px;
      border:none;
      border-radius:16px;
      background:#7a4b2c;
      color:#fff;
      font-weight:900;
      font-size:17px;
      cursor:pointer;
    }

    .btn:hover{ background:#5f3821; }

    .hint{
      margin-top:10px;
      color:#7a6653;
      font-size:14px;
      line-height:1.6;
    }
  </style>
</head>

<body>
<header>
  <h1 class="main-title">בית המאפה הקטן בדולב</h1>
  <img class="logo" src="logo-new.jpg" alt="logo" />
  <div class="sub-title">מאפיית בוטיק למאפי מחמצת</div>
</header>

<main>
  <!-- כל המוצרים כאן (בלי כותרות נוספות) -->
  <div class="grid" id="products"></div>

  <div class="box">
    <h2>פרטי הזמנה</h2>

    <input id="custName" type="text" placeholder="שם מלא" />
    <input id="custPhone" type="tel" placeholder="טלפון" />
    <input id="pickupDate" type="date" />

    <select id="pickupLocation">
      <option value="">בחר נקודת איסוף</option>
      <option value="דולב">דולב – להזמין לילה לפני, אין איסוף לחמים ביום ראשון</option>
      <option value="בית שמש">בית שמש – בית משפחת מוריס (לברר יום איסוף)</option>
      <option value="גבעות עדן">גבעות עדן – משפחת מוריס (יונתן ואליטל)</option>
    </select>

    <div class="hint">
      בדולב: יש להזמין לילה לפני • אין איסוף לחמים ביום ראשון (מאפינס כן)
    </div>

    <textarea id="notes" placeholder="הערות להזמנה"></textarea>

    <div class="total">סה״כ: <span id="total">₪0</span></div>
    <button class="btn" id="sendBtn" type="button">שליחת הזמנה ב-WhatsApp</button>
  </div>
</main>

<!-- מומלץ לשנות מספר כדי לעקוף קאש באייפון -->
<script src="app.js?v=5"></script>
</body>
</html>
